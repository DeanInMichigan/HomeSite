---
layout: default
---

<main class="article-page">
  <div class="container">

    <a href="{{ '/#articles' | relative_url }}" class="back-link">← Back to Articles</a>

    <div class="article-header">
      <div class="article-tag">{{ page.tag }}</div>
      <h1>{{ page.title }}</h1>
      <p class="article-meta">Dean Abraham &nbsp;·&nbsp; {{ page.tag }}</p>
    </div>

    {% if page.image %}
    <div class="article-hero">
      <img src="{{ page.image | relative_url }}" alt="{{ page.title }}">
    </div>
    {% endif %}

    <article class="prose">
      {{ content }}
    </article>

    <script type="module">
      import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
      mermaid.initialize({ startOnLoad: false, theme: 'neutral' });
      document.querySelectorAll('pre code.language-mermaid').forEach(el => {
        const div = document.createElement('div');
        div.className = 'mermaid';
        div.textContent = el.textContent;
        el.closest('pre').replaceWith(div);
      });
      await mermaid.run();
    </script>

    <section class="comments">
      <h2 class="comments-title">Comments</h2>
      <!-- Giscus comments widget — configure at https://giscus.app -->
      <!-- Replace data-repo, data-repo-id, data-category, data-category-id with HomeSite values -->
      <div class="comments-placeholder">
        <p>Comments powered by <a href="https://giscus.app" target="_blank" rel="noopener">Giscus</a>.</p>
      </div>
    </section>

  </div>
</main>
